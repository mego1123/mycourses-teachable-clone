version: "2"
sql:
  - engine: "postgresql"
    queries: "queries/"
    schema: "migrations/"
    gen:
      go:
        package: "gen"
        out: "internal/db/gen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type: "*github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"
          - db_type: "jsonb"
            nullable: true
            go_type: "encoding/json.RawMessage"
          - db_type: "text[]"
            go_type:
              import: "github.com/lib/pq"
              type: "StringArray"
          - db_type: "text[]"
            nullable: true
            go_type:
              import: "github.com/lib/pq"
              type: "StringArray"
